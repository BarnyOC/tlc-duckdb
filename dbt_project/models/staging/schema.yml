# AIModified:2026-06-01T07:29:46Z
version: 2

models:
  - name: stg_tlc__yellow_trips
    description: One row per yellow taxi trip from TLC Parquet.
    columns:
      - name: pickup_at
        description: Timestamp when the meter was engaged.
        tests:
          - not_null
      - name: dropoff_at
        description: Timestamp when the meter was disengaged.
        tests:
          - not_null
      - name: total_amount
        description: Total amount charged to passengers.
        tests:
          - not_null
